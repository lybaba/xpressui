<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>xpressui hybrid output snapshot demo</title>
    <link rel="stylesheet" href="../index.css" />
    <style>
      :root {
        --bg: #f4f8ff;
        --ink: #0f172a;
        --muted: #475569;
        --line: #cbd5e1;
        --panel: #ffffff;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: "Segoe UI", system-ui, sans-serif;
        background:
          radial-gradient(circle at 12% 10%, rgba(59, 130, 246, 0.12), transparent 32%),
          radial-gradient(circle at 88% 8%, rgba(20, 184, 166, 0.12), transparent 28%),
          linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
        color: var(--ink);
      }

      main { max-width: 1440px; margin: 0 auto; padding: 34px 20px 70px; }
      h1 { margin: 0 0 8px; font-size: clamp(1.9rem, 4vw, 2.8rem); }
      p { margin: 0; color: var(--muted); }
      a { color: #0c4a6e; }

      .layout {
        margin-top: 24px;
        display: grid;
        gap: 20px;
        grid-template-columns: minmax(0, 1fr) 340px;
        align-items: start;
      }

      .shell,
      .snapshot,
      .debug {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 18px;
        box-shadow: 0 12px 28px rgba(15, 23, 42, 0.06);
      }

      .snapshot h2,
      .debug h2,
      .shell h2 { margin: 0; font-size: 1rem; }

      .snapshot pre {
        margin: 0;
        padding: 12px;
        border-radius: 12px;
        background: #0f172a;
        color: #dbeafe;
        overflow: auto;
        font-size: 12px;
        line-height: 1.45;
      }

      .stack { display: grid; gap: 20px; }

      @media (max-width: 1100px) {
        .layout { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main>
      <a href="./index.html">Retour aux démos</a>
      <h1>Hybrid Output Snapshot</h1>
      <p>Démo live de l’événement <code>xpressui:output-snapshot</code> et du panneau ops combiné avec snapshot de rendu.</p>

      <div class="layout">
        <section class="shell">
          <h2>Live Form</h2>
          <div id="app">
            <form id="hybrid_output_snapshot_demo_form" data-version="1" data-type="contactform" data-name="hybrid-output-snapshot-demo" data-label="Hybrid Snapshot Demo">
              <div data-type="section" data-name="main" data-label="Main">
                <label class="w-full">
                  <span>Title</span>
                  <input id="title" name="title" type="text" data-type="text" data-name="title" data-label="Title" data-required="true" data-section-name="main" />
                  <div id="title_view" data-view-field="title">
                    <div data-view-field-body="title"></div>
                  </div>
                </label>
                <label class="w-full">
                  <span>Description</span>
                  <textarea id="description" name="description" data-type="textarea" data-name="description" data-label="Description" data-section-name="main"></textarea>
                  <div id="description_view" data-view-field="description">
                    <div data-view-field-body="description"></div>
                  </div>
                </label>
                <label class="w-full">
                  <span>Tags</span>
                  <select id="tags" name="tags" multiple data-type="select-multiple" data-name="tags" data-label="Tags" data-section-name="main">
                    <option value="priority">Priority</option>
                    <option value="customer">Customer</option>
                    <option value="internal">Internal</option>
                  </select>
                  <div id="tags_view" data-view-field="tags">
                    <div data-view-field-body="tags"></div>
                  </div>
                </label>
                <label class="w-full">
                  <span>Resource URL</span>
                  <input id="resource_url" name="resource_url" type="url" data-type="url" data-name="resource_url" data-label="Resource URL" data-section-name="main" />
                  <div id="resource_url_view" data-view-field="resource_url">
                    <div data-view-field-body="resource_url"></div>
                  </div>
                </label>
              </div>
            </form>
          </div>
        </section>

        <section class="stack">
          <aside class="snapshot">
            <h2>Latest Output Snapshot Event</h2>
            <pre id="snapshot-json">{}</pre>
          </aside>
          <aside class="debug">
            <h2>Debug Panel</h2>
            <div id="debug"></div>
          </aside>
        </section>
      </div>
    </main>

    <script type="module">
      import { createFormOpsPanel, hydrateForm } from "../dist/xpressui.mjs";

      const app = document.getElementById("app");
      const debug = document.getElementById("debug");
      const latestSnapshot = document.getElementById("snapshot-json");

      const form = hydrateForm(app, {
        version: 1,
        id: "hybrid_output_snapshot_demo",
        uid: "hybrid_output_snapshot_demo_uid",
        type: "contactform",
        name: "hybrid-output-snapshot-demo",
        title: "Hybrid Snapshot Demo",
        sections: {
          main: [
            { type: "text", name: "title", label: "Title", required: true },
            { type: "textarea", name: "description", label: "Description" },
            {
              type: "select-multiple",
              name: "tags",
              label: "Tags",
              choices: [
                { value: "priority", label: "Priority" },
                { value: "customer", label: "Customer" },
                { value: "internal", label: "Internal" },
              ],
            },
            { type: "url", name: "resource_url", label: "Resource URL" },
          ],
        },
      });

      form.setAttribute("mode", "hybrid");
      form.setViewValues({
        title: "Live snapshot title",
        description: "Edit any field and watch output snapshot update in real-time.",
        tags: ["priority", "customer"],
        resource_url: "https://example.test/resource",
      });

      form.setFieldOutputRenderer("tags", ({ value }) => {
        const list = document.createElement("ul");
        list.style.margin = "0";
        list.style.paddingLeft = "18px";
        const tags = Array.isArray(value) ? value : [];
        if (!tags.length) {
          const empty = document.createElement("li");
          empty.textContent = "No tags";
          list.appendChild(empty);
          return list;
        }
        tags.forEach((tag) => {
          const item = document.createElement("li");
          item.textContent = `#${tag}`;
          list.appendChild(item);
        });
        return list;
      });

      const panel = createFormOpsPanel(form, form, {
        title: "Hybrid Ops",
        debug: { title: "Runtime Debug" },
        admin: { title: "Runtime Admin", incidentLimit: 3 },
      });
      debug.appendChild(panel.element);

      form.addEventListener("xpressui:output-snapshot", (event) => {
        latestSnapshot.textContent = JSON.stringify(event.detail?.result || {}, null, 2);
      });

      form.refreshOutputRendering();
    </script>
  </body>
</html>
