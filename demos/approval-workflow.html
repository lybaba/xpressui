<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>xpressui approval workflow demo</title>
    <link rel="stylesheet" href="../index.css" />
    <style>
      body { margin: 0; font-family: system-ui, sans-serif; background: #f8fafc; color: #0f172a; }
      main { max-width: 980px; margin: 0 auto; padding: 32px 20px 60px; }
      h1 { margin: 0 0 8px; }
      p { color: #475569; }
      .layout { display: grid; grid-template-columns: minmax(0, 1fr) 320px; gap: 20px; margin-top: 24px; }
      .shell, .debug { padding: 20px; background: #fff; border: 1px solid #e2e8f0; border-radius: 16px; }
      a { color: #0f766e; }
      @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <main>
      <a href="./index.html">Retour aux démos</a>
      <h1>Approval Workflow</h1>
      <p>Démo d’un flux d’approbation avec debug panel local branché sur les événements.</p>
      <div class="layout">
        <div class="shell" id="app"></div>
        <div class="debug" id="debug"></div>
      </div>
    </main>
    <script type="module">
      import { createFormDebugPanel, mountFormUI } from "../dist/xpressui.mjs";

      const app = document.getElementById("app");
      const debug = document.getElementById("debug");

      const form = mountFormUI(app, {
        version: 1,
        id: "approval_demo",
        uid: "approval_demo_uid",
        type: "multistepform",
        name: "approval-demo",
        title: "Approval Demo",
        provider: {
          type: "approval-request",
          endpoint: "/api/approvals",
        },
        workflowStepTargets: {
          pending_approval: "review_step",
          approved: "review_step",
          completed: "review_step",
        },
        stepSections: [
          { type: "section", name: "request_step", label: "Request" },
          { type: "section", name: "review_step", label: "Review", stepSummary: true },
        ],
        sections: {
          custom: [
            { type: "section", name: "request_step", label: "Request" },
            { type: "section", name: "review_step", label: "Review", stepSummary: true },
          ],
          request_step: [
            { type: "email", name: "requester_email", label: "Requester Email", required: true },
            { type: "number", name: "amount", label: "Amount", required: true },
          ],
          review_step: [
            { type: "approval-state", name: "approval_state", label: "Approval Status" },
          ],
        },
      });

      const panel = createFormDebugPanel(form);
      debug.appendChild(panel.element);
    </script>
  </body>
  </html>
