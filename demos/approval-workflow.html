<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>xpressui approval workflow demo</title>
    <link rel="stylesheet" href="../index.css" />
    <style>
      body { margin: 0; font-family: system-ui, sans-serif; background: #f8fafc; color: #0f172a; }
      main { max-width: 1400px; margin: 0 auto; padding: 32px 20px 60px; }
      h1 { margin: 0 0 8px; }
      p { color: #475569; }
      .layout { display: grid; grid-template-columns: minmax(0, 1fr) 320px; gap: 20px; margin-top: 24px; align-items: start; }
      .shell, .debug, .result { padding: 20px; background: #fff; border: 1px solid #e2e8f0; border-radius: 16px; }
      .primary { display: grid; gap: 20px; min-width: 0; }
      .stack { display: grid; gap: 20px; min-width: 0; }
      .result h2 { margin: 0 0 12px; font-size: 1rem; }
      .result p { margin: 0 0 10px; font-size: 0.9rem; }
      .result pre {
        margin: 0;
        padding: 12px;
        overflow: auto;
        border-radius: 12px;
        background: #0f172a;
        color: #e2e8f0;
        font-size: 12px;
        line-height: 1.45;
      }
      a { color: #0f766e; }
      @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <main>
      <a href="./index.html">Retour aux démos</a>
      <h1>Approval Workflow</h1>
      <p>Démo d’un flux d’approbation avec panneau ops combiné branché sur les événements et l’état local.</p>
      <div class="layout">
        <div class="primary">
          <div class="shell" id="app">
            <form id="approval_demo_form" data-version="1" data-type="multistepform" data-name="approval-demo" data-label="Approval Demo">
              <div data-type="section" data-name="request_step" data-label="Request">
                <label class="w-full">
                  <span>Requester Email</span>
                  <input id="requester_email" name="requester_email" type="email" data-type="email" data-name="requester_email" data-label="Requester Email" data-required="true" data-section-name="request_step" />
                </label>
                <label class="w-full">
                  <span>Amount</span>
                  <input id="amount" name="amount" type="number" data-type="number" data-name="amount" data-label="Amount" data-required="true" data-section-name="request_step" />
                </label>
              </div>
              <div data-type="section" data-name="review_step" data-label="Review">
                <input id="approval_state" name="approval_state" type="hidden" data-type="approval-state" data-name="approval_state" data-label="Approval Status" data-section-name="review_step" />
              </div>
            </form>
          </div>
          <div class="result" id="result"></div>
        </div>
        <div class="stack">
          <div class="debug" id="debug"></div>
        </div>
      </div>
    </main>
    <script type="module">
      import { createFormOpsPanel, hydrateFormUI } from "../dist/xpressui.mjs";

      const app = document.getElementById("app");
      const debug = document.getElementById("debug");
      const result = document.getElementById("result");

      const renderResult = (title, description, data) => {
        result.innerHTML = "";

        const heading = document.createElement("h2");
        heading.textContent = title;
        result.appendChild(heading);

        if (description) {
          const copy = document.createElement("p");
          copy.textContent = description;
          result.appendChild(copy);
        }

        const payload = document.createElement("pre");
        payload.textContent = JSON.stringify(data, null, 2);
        result.appendChild(payload);
      };

      renderResult(
        "Submitted Values",
        "Soumettez le formulaire pour voir le payload envoyé et la réponse mockée de l'API.",
        {},
      );

      const originalFetch = window.fetch.bind(window);
      window.fetch = async (input, init = {}) => {
        const url = typeof input === "string" ? input : input instanceof Request ? input.url : "";
        if (url.endsWith("/api/approvals")) {
          const bodyText = typeof init.body === "string" ? init.body : "{}";
          const parsedBody = JSON.parse(bodyText || "{}");
          const amount = Number(parsedBody?.approval?.amount || 0);
          const status = amount >= 1000 ? "pending_approval" : "approved";
          const payload = {
            status,
            approvalId: "apr_demo_123",
            received: parsedBody,
          };

          return new Response(JSON.stringify(payload), {
            status: 200,
            headers: {
              "Content-Type": "application/json",
            },
          });
        }

        return originalFetch(input, init);
      };

      const form = hydrateFormUI(app, {
        version: 1,
        id: "approval_demo",
        uid: "approval_demo_uid",
        type: "multistepform",
        mode: "form-multi-step",
        name: "approval-demo",
        title: "Approval Demo",
        provider: {
          type: "approval-request",
          endpoint: "/api/approvals",
        },
        workflowStepTargets: {
          pending_approval: "review_step",
          approved: "review_step",
          completed: "review_step",
        },
        stepSections: [
          { type: "section", name: "request_step", label: "Request" },
          { type: "section", name: "review_step", label: "Review", stepSummary: true },
        ],
        sections: {
          custom: [
            { type: "section", name: "request_step", label: "Request" },
            { type: "section", name: "review_step", label: "Review", stepSummary: true },
          ],
          request_step: [
            { type: "email", name: "requester_email", label: "Requester Email", required: true },
            { type: "number", name: "amount", label: "Amount", required: true },
          ],
          review_step: [
            { type: "approval-state", name: "approval_state", label: "Approval Status" },
          ],
        },
      });

      form.addEventListener("xpressui:submit", (event) => {
        renderResult(
          "Submitted Values",
          "Payload envoyé au provider approval-request.",
          event.detail?.values || {},
        );
      });

      form.addEventListener("xpressui:approval-requested", (event) => {
        renderResult(
          "Approval Requested",
          "Réponse mockée: le backend a créé une demande d'approbation en attente.",
          event.detail?.result || {},
        );
      });

      form.addEventListener("xpressui:approval-complete", (event) => {
        renderResult(
          "Approval Complete",
          "Réponse mockée: le backend a approuvé directement la demande.",
          event.detail?.result || {},
        );
      });

      form.addEventListener("xpressui:submit-error", (event) => {
        renderResult(
          "Submit Error",
          "Erreur de soumission renvoyée par le runtime.",
          event.detail?.result || {},
        );
      });

      const panel = createFormOpsPanel(form, form, {
        title: "Approval Ops",
        debug: { title: "Approval Debug" },
        admin: { title: "Approval Admin" },
      });
      debug.appendChild(panel.element);
    </script>
  </body>
  </html>
