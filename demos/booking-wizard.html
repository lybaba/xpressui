<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>xpressui booking wizard demo</title>
    <style>
      body { margin: 0; font-family: system-ui, sans-serif; background: #f8fafc; color: #0f172a; }
      main { max-width: 840px; margin: 0 auto; padding: 32px 20px 60px; }
      h1 { margin: 0 0 8px; }
      p { color: #475569; }
      .shell { margin-top: 24px; padding: 20px; background: #fff; border: 1px solid #e2e8f0; border-radius: 16px; }
      a { color: #0f766e; }
    </style>
  </head>
  <body>
    <main>
      <a href="./index.html">Retour aux démos</a>
      <h1>Booking Wizard</h1>
      <p>Preset multi-step avec progression native, revue finale et saut conditionnel.</p>
      <div class="shell" id="app"></div>
    </main>
    <script type="module">
      import { createFormPreset, mountFormUI } from "../dist/xpressui.mjs";

      const container = document.getElementById("app");
      mountFormUI(container, createFormPreset("booking-wizard"));
    </script>
  </body>
  </html>
