<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>xpressui file uploads demo</title>
    <link rel="stylesheet" href="../index.css" />
    <style>
      body { margin: 0; font-family: system-ui, sans-serif; background: #fff7ed; color: #1f2937; }
      main { max-width: 1240px; margin: 0 auto; padding: 32px 20px 60px; }
      h1 { margin: 0 0 8px; }
      p { color: #57534e; }
      .layout { display: grid; grid-template-columns: minmax(0, 1fr); gap: 20px; margin-top: 24px; align-items: start; }
      .shell { padding: 20px; background: #fff; border: 1px solid #fed7aa; border-radius: 16px; }
      a { color: #c2410c; }
      @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <main>
      <a href="./index.html">Retour aux démos</a>
      <h1>File Uploads</h1>
      <p>Champ fichier multiple avec drag-and-drop, validation et previews.</p>
      <div class="layout">
        <div class="shell" id="app">
          <form id="upload_demo_form" data-version="1" data-type="contactform" data-name="upload-demo" data-label="Upload Demo">
            <div data-type="section" data-name="main" data-label="Main">
              <label class="w-full">
                <span>Full Name</span>
                <input id="full_name" name="full_name" type="text" data-type="text" data-name="full_name" data-label="Full Name" data-required="true" data-section-name="main" />
              </label>
              <label class="w-full">
                <span>Attachments</span>
                <input
                  id="attachments"
                  name="attachments"
                  type="file"
                  multiple
                  accept=".pdf,image/*"
                  data-type="file"
                  data-name="attachments"
                  data-label="Attachments"
                  data-section-name="main"
                  data-min-files="1"
                  data-max-files="4"
                  data-max-file-size="5242880"
                  data-max-total-file-size="12582912"
                  data-file-drop-mode="append"
                  data-form-data-field-name="attachments[]"
                  data-file-drop-zone="attachments"
                />
                <div id="attachments_selection" data-upload-selection-zone="attachments">
                  <div data-upload-selection-title="attachments">Awaiting file</div>
                  <div data-upload-selection-message="attachments">Drop files here or use the file picker.</div>
                  <div data-upload-selection-body="attachments"></div>
                </div>
              </label>
            </div>
          </form>
        </div>
      </div>
    </main>
    <script type="module">
      import { hydrateFormUI } from "../dist/hydrate.mjs";

      const container = document.getElementById("app");
      hydrateFormUI(container, {
        version: 1,
        id: "upload_demo",
        uid: "upload_demo_uid",
        type: "contactform",
        name: "upload-demo",
        title: "Upload Demo",
        submit: {
          endpoint: "/api/uploads",
          mode: "form-data",
          formDataArrayMode: "repeat",
        },
        sections: {
          main: [
            { type: "text", name: "full_name", label: "Full Name", required: true },
            {
              type: "file",
              name: "attachments",
              label: "Attachments",
              multiple: true,
              minFiles: 1,
              maxFiles: 4,
              maxFileSizeMb: 5,
              maxTotalFileSizeMb: 12,
              accept: ".pdf,image/*",
              fileDropMode: "append",
              formDataFieldName: "attachments[]",
            },
          ],
        },
      });
    </script>
  </body>
  </html>
