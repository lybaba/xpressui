<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>xpressui multi-step review demo</title>
    <link rel="stylesheet" href="../index.css" />
    <style>
      body { margin: 0; font-family: system-ui, sans-serif; background: #f8fafc; color: #0f172a; }
      main { max-width: 1440px; margin: 0 auto; padding: 32px 20px 60px; }
      h1 { margin: 0 0 8px; }
      p { color: #475569; }
      .layout { display: grid; grid-template-columns: minmax(0, 1fr) 320px; gap: 20px; margin-top: 24px; align-items: start; }
      .shell, .preview { padding: 20px; background: #fff; border: 1px solid #e2e8f0; border-radius: 16px; }
      .preview h2 { margin: 0 0 12px; font-size: 1rem; }
      .preview small { display: block; margin-bottom: 12px; color: #64748b; }
      .preview pre {
        margin: 0;
        padding: 12px;
        overflow: auto;
        border-radius: 12px;
        background: #0f172a;
        color: #e2e8f0;
        font-size: 12px;
        line-height: 1.45;
      }
      .tip { margin-top: 16px; padding: 12px; border-radius: 12px; background: #ecfeff; border: 1px solid #a5f3fc; color: #155e75; font-size: 13px; }
      a { color: #0f766e; }
      @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <main>
      <a href="./index.html">Retour aux démos</a>
      <h1>Multi-Step Review</h1>
      <p>
        Démo d’un wizard multi-step avec prévisualisation des données de l’étape courante
        et un résumé final natif sur la dernière étape.
      </p>
      <div class="layout">
        <div class="shell" id="app">
          <form id="multi_step_review_demo_form" data-version="1" data-type="multistepform" data-name="multi-step-review-demo" data-label="Project Intake Wizard">
            <div data-type="section" data-name="contact_step" data-label="Contact">
              <label class="w-full">
                <span>Full Name</span>
                <input id="full_name" name="full_name" type="text" data-type="text" data-name="full_name" data-label="Full Name" data-required="true" data-section-name="contact_step" />
              </label>
              <label class="w-full">
                <span>Work Email</span>
                <input id="email" name="email" type="email" data-type="email" data-name="email" data-label="Work Email" data-required="true" data-section-name="contact_step" />
              </label>
              <label class="w-full">
                <span>Team</span>
                <select id="team" name="team" data-type="select" data-name="team" data-label="Team" data-required="true" data-section-name="contact_step">
                  <option value=""></option>
                  <option value="sales">Sales</option>
                  <option value="operations">Operations</option>
                  <option value="support">Support</option>
                </select>
              </label>
            </div>
            <div data-type="section" data-name="project_step" data-label="Project">
              <label class="w-full">
                <span>Project Name</span>
                <input id="project_name" name="project_name" type="text" data-type="text" data-name="project_name" data-label="Project Name" data-required="true" data-section-name="project_step" />
              </label>
              <fieldset class="w-full">
                <legend>Channels</legend>
                <label>
                  <input type="checkbox" name="channels" value="email" data-type="checkbox" data-name="channels" data-label="Email" data-section-name="project_step" />
                  <span>Email</span>
                </label>
                <label>
                  <input type="checkbox" name="channels" value="sms" data-type="checkbox" data-name="channels" data-label="SMS" data-section-name="project_step" />
                  <span>SMS</span>
                </label>
                <label>
                  <input type="checkbox" name="channels" value="web" data-type="checkbox" data-name="channels" data-label="Web" data-section-name="project_step" />
                  <span>Web</span>
                </label>
                <label>
                  <input type="checkbox" name="channels" value="retail" data-type="checkbox" data-name="channels" data-label="Retail" data-section-name="project_step" />
                  <span>Retail</span>
                </label>
              </fieldset>
              <label class="w-full">
                <span>Scope Notes</span>
                <textarea id="notes" name="notes" data-type="textarea" data-name="notes" data-label="Scope Notes" data-section-name="project_step"></textarea>
              </label>
            </div>
            <div data-type="section" data-name="review_step" data-label="Review">
              <div id="final_hint" data-type="output" data-name="final_hint" data-label="Final Review" data-section-name="review_step"></div>
            </div>
          </form>
        </div>
        <aside class="preview" id="preview"></aside>
      </div>
    </main>
    <script type="module">
      import { hydrateFormUI } from "../dist/xpressui.mjs";

      const app = document.getElementById("app");
      const preview = document.getElementById("preview");

      const config = {
        version: 1,
        id: "multi_step_review_demo",
        uid: "multi_step_review_demo_uid",
        type: "multistepform",
        mode: "form-multi-step",
        name: "multi-step-review-demo",
        title: "Project Intake Wizard",
        navigationLabels: {
          prevLabel: "Back",
          nextLabel: "Continue",
        },
        stepSections: [
          { type: "section", name: "contact_step", label: "Contact" },
          { type: "section", name: "project_step", label: "Project" },
          { type: "section", name: "review_step", label: "Review", stepSummary: true },
        ],
        sections: {
          custom: [
            { type: "section", name: "contact_step", label: "Contact" },
            { type: "section", name: "project_step", label: "Project" },
            { type: "section", name: "review_step", label: "Review", stepSummary: true },
          ],
          contact_step: [
            { type: "text", name: "full_name", label: "Full Name", required: true },
            { type: "email", name: "email", label: "Work Email", required: true },
            {
              type: "select-one",
              name: "team",
              label: "Team",
              required: true,
              choices: [
                { label: "Sales", value: "sales" },
                { label: "Operations", value: "operations" },
                { label: "Support", value: "support" },
              ],
            },
          ],
          project_step: [
            { type: "text", name: "project_name", label: "Project Name", required: true },
            {
              type: "select-multiple",
              name: "channels",
              label: "Channels",
              choices: [
                { label: "Email", value: "email" },
                { label: "SMS", value: "sms" },
                { label: "Web", value: "web" },
                { label: "Retail", value: "retail" },
              ],
            },
            { type: "textarea", name: "notes", label: "Scope Notes" },
          ],
          review_step: [
            { type: "output", name: "final_hint", label: "Final Review" },
          ],
        },
      };

      const form = hydrateFormUI(app, config);

      const renderCurrentStepPreview = () => {
        const currentStepName = form.getCurrentStepName();
        const stepFields = config.sections[currentStepName] || [];
        const values = form.form?.getState().values || {};
        const isReviewStep = currentStepName === "review_step";
        preview.innerHTML = "";

        const heading = document.createElement("h2");
        heading.textContent = isReviewStep ? "Final Values Preview" : "Current Step Preview";
        preview.appendChild(heading);

        const subtitle = document.createElement("small");
        subtitle.textContent = `${form.getCurrentStepIndex() + 1}. ${currentStepName}`;
        preview.appendChild(subtitle);

        const stepSnapshot = isReviewStep ? { ...values } : {};
        if (!isReviewStep) {
          stepFields.forEach((field) => {
            if (!field?.name || field.type === "output") {
              return;
            }
            stepSnapshot[field.name] = values[field.name] ?? null;
          });
        }

        const payload = document.createElement("pre");
        payload.textContent = JSON.stringify(stepSnapshot, null, 2);
        preview.appendChild(payload);

        const tip = document.createElement("div");
        tip.className = "tip";
        tip.textContent =
          isReviewStep
            ? "On the final step, this panel switches to the full form payload so you can compare it with the built-in summary in the form."
            : "This panel only shows the fields linked to the current step. Move between steps to compare the values.";
        preview.appendChild(tip);
      };

      form.addEventListener("xpressui:step-change", renderCurrentStepPreview);
      form.addEventListener("input", renderCurrentStepPreview);
      form.addEventListener("change", renderCurrentStepPreview);

      renderCurrentStepPreview();
    </script>
  </body>
  </html>
